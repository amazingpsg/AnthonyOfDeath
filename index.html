<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동서양이 알려주는 마지막 존엄의 지도</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Light Orbs for Mystical Atmosphere -->
    <div class="light-orb orb-1"></div>
    <div class="light-orb orb-2"></div>
    <div class="light-orb orb-3"></div>

    <!-- Background Mystical Ambient BGM -->
    <audio id="bgm" src="bgm.mp3" loop></audio>

    <!-- Floating BGM Controls -->
    <button class="sound-toggle-btn muted" id="soundToggle" aria-label="BGM 토글">
        <!-- Sound Muted SVG -->
        <svg class="mute-icon" viewBox="0 0 24 24"><path d="M3.63 3.63L2.22 5.04 7.18 10H3v4h4l5 5v-6.18l4.46 4.46c-.56.45-1.2.82-1.96 1.05v2.06c1.3-.3 2.48-.93 3.47-1.78l2.99 2.99 1.41-1.41L3.63 3.63zM10 15.17L7.83 13H5v-2h2.83l2-2v6.17zM12 4L9.91 6.09 12 8.18V4zm4.5 8c0-.98-.42-1.89-1.09-2.5l1.43-1.43C17.9 9.13 18.5 10.5 18.5 12c0 1.9-1.07 3.55-2.64 4.41l-1.43-1.43c.9-.45 1.57-1.34 1.57-2.98zm2.5 0c0-1.87-.77-3.55-2-4.76l1.42-1.42c1.78 1.61 2.58 3.96 2.58 6.18 0 2.57-1.02 4.9-2.77 6.47l-1.42-1.42c1.37-1.22 2.19-2.88 2.19-5.05z"/></svg>
        <!-- Sound Playing SVG -->
        <svg class="sound-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>



    <main class="viewer-container">
        <!-- 3D Carousel Stage -->
        <div class="carousel-stage">
            <div class="carousel-track" id="carouselTrack">
                <!-- Javascript will populate 20 items here dynamically to keep HTML clean -->
            </div>
        </div>

        <!-- Controls & Information -->
        <div class="carousel-controls">
            <button class="nav-btn prev-btn" id="prevBtn" aria-label="이전 슬라이드">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            
            <div class="info-panel">
                <div class="slide-counter"><span id="currentNum">01</span> <span class="divider">/</span> <span class="total-count">14</span></div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <button class="nav-btn next-btn" id="nextBtn" aria-label="다음 슬라이드">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
    </main>



    <!-- Interactive Help overlay -->
    <div class="help-toast">
        💡 마우스 휠이나 키보드 방향키(←, →)를 사용하여 여정을 이어갈 수 있사옵니다.
    </div>

    <script src="app.js"></script>
</body>
</html>
